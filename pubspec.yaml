name: deepfake_ekyc_flutter
description: Real-time EKYC presentation attack detection using Flutter and ViViT model.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Media
  camera: ^0.10.5+2
  video_player: ^2.7.0
  image: ^4.0.17
  
  # WebSocket & Networking
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  
  # State Management
  provider: ^6.0.6
  
  # Permissions
  permission_handler: ^11.4.3
  
  # UI Enhancements
  flutter_spinkit: ^5.2.0
  fl_chart: ^0.63.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # Uncomment and update the following lines to include custom fonts in your application
  # fonts:
